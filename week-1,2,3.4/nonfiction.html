<!DOCTYPE html>
<html>
	<head>
		<title>Non-Fiction Books</title>
		<style>
			body{
				background-image: url('https://images.pexels.com/photos/1907785/pexels-photo-1907785.jpeg');
				height: 100vh;
				background-size: cover;
				color: white;
				text-align: center;
				padding: 12px;
			}
			.book-card{
				background-color: white;
				padding: 12px;
				margin: 12px;
				width:26%;
			}
			button{
				background-color: lightblue;
				padding: 8px;
				margin: 8px;
				border-width: 0;
			}
			img{
				width: 25vw;
				height: 50vh;
			}
			h3{
				color: black;
			}
			.main-card{
				display: flex;
				justify-content: center;
			}
		</style>
	</head>
	<body>
		<h1>Non-Fiction Books</h1>
		<p>Explore inspiring and informative non-fiction books</p>

		<div class="main-card">
			<div class="book-card">
				<img src="https://m.media-amazon.com/images/I/81bsw6fnUiL.jpg"/>
				<h3>Atomic Habits</h3>
				<button onclick="viewBook(this)">View</button>
    			<button onclick="addToCart(this)">Add to Cart</button>
			</div>
			<div class="book-card">
				<img src="https://m.media-amazon.com/images/I/71t4GuxLCuL.jpg"/>
				<h3>The Power of Habit</h3>
				<button onclick="viewBook(this)">View</button>
    			<button onclick="addToCart(this)">Add to Cart</button>
			</div>
			<div class="book-card">
				<img src="https://m.media-amazon.com/images/I/81wgcld4wxL.jpg"/>
				<h3>Think Like a Monk</h3>
				<button onclick="viewBook(this)">View</button>
    			<button onclick="addToCart(this)">Add to Cart</button>
			</div>
		</div>

		<div class="main-card">
			<div class="book-card">
				<img src="https://m.media-amazon.com/images/I/81vpsIs58WL.jpg"/>
				<h3>Ikigai</h3>
				<button onclick="viewBook(this)">View</button>
    			<button onclick="addToCart(this)">Add to Cart</button>
			</div>
			<div class="book-card">
				<img src="https://m.media-amazon.com/images/I/71KilybDOoL.jpg"/>
				<h3>Rich Dad Poor Dad</h3>
				<button onclick="viewBook(this)">View</button>
    			<button onclick="addToCart(this)">Add to Cart</button>
			</div>
		</div>
	<script>
	function viewBook(btn){
	let name = btn.parentElement.querySelector("h3").innerText;
	window.location.href = "book.html?name=" + encodeURIComponent(name);
	}

	function addToCart(btn){
	let user = localStorage.getItem("currentUser");
	if(!user) return alert("Please login first");

	let book = btn.parentElement.querySelector("h3").innerText;
	let key = "cart_" + user;

	let cart = JSON.parse(localStorage.getItem(key)) || [];
	cart.push(book);

	localStorage.setItem(key, JSON.stringify(cart));
	}

	</script>
	</body>
</html>
