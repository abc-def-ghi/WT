<!DOCTYPE html>
<html>
	<head>
		<title>Science Books</title>
		<style>
			body{
				background-image: url('https://i.pinimg.com/736x/e7/d7/d1/e7d7d16473040020d33b21f1d1bc7ea8.jpg');
				height: 100vh;
				background-size: cover;
				color: white;
				text-align: center;
				padding: 12px;
			}
			.book-card{
				background-color: white;
				padding: 12px;
				margin: 12px;
				width:26%;
			}
			button{
				background-color: lightblue;
				padding: 8px;
				margin: 8px;
				border-width: 0;
			}
			img{
				width: 25vw;
				height: 50vh;
			}
			h3{
				color: black;
			}
			.main-card{
				display: flex;
				justify-content: center;
			}
		</style>
	</head>
	<body>
		<h1>Science Books</h1>
		<p>Discover the wonders of science and technology</p>

		<div class="main-card">
			<div class="book-card">
				<img src="https://upload.wikimedia.org/wikipedia/en/a/a3/BriefHistoryTime.jpg"/>
				<h3>A Brief History of Time</h3>
				<button onclick="viewBook(this)">View</button>
    			<button onclick="addToCart(this)">Add to Cart</button>
			</div>
			<div class="book-card">
				<img src="https://m.media-amazon.com/images/I/61fR6OnVBUL._AC_UF1000,1000_QL80_.jpg"/>
				<h3>The Theory of Everything</h3>
				<button onclick="viewBook(this)">View</button>
    			<button onclick="addToCart(this)">Add to Cart</button>
			</div>
			<div class="book-card">
				<img src="https://m.media-amazon.com/images/I/91W+Ff1W4ZL._AC_UF1000,1000_QL80_.jpg"/>
				<h3>Cosmos</h3>
				<button onclick="viewBook(this)">View</button>
    			<button onclick="addToCart(this)">Add to Cart</button>
			</div>
		</div>

		<div class="main-card">
			<div class="book-card">
				<img src="https://m.media-amazon.com/images/I/71+Ggj5aqKL._UF1000,1000_QL80_.jpg"/>
				<h3>The Selfish Gene</h3>
				<button onclick="viewBook(this)">View</button>
    			<button onclick="addToCart(this)">Add to Cart</button>
			</div>
			<div class="book-card">
				<img src="https://m.media-amazon.com/images/I/914EiU2QImL.jpg"/>
				<h3>Astrophysics for People in a Hurry</h3>
				<button onclick="viewBook(this)">View</button>
    			<button onclick="addToCart(this)">Add to Cart</button>
			</div>
		</div>
	<script>
	function viewBook(btn){
	let name = btn.parentElement.querySelector("h3").innerText;
	window.location.href = "book.html?name=" + encodeURIComponent(name);
	}
	function addToCart(btn){
	let user = localStorage.getItem("currentUser");
	if(!user) return alert("Please login first");

	let book = btn.parentElement.querySelector("h3").innerText;
	let key = "cart_" + user;

	let cart = JSON.parse(localStorage.getItem(key)) || [];
	cart.push(book);

	localStorage.setItem(key, JSON.stringify(cart));
	}
	</script>
	</body>
</html>
